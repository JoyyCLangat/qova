name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  sdk:
    name: SDK — Type Check & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: sdk

      - name: Type check
        run: npx tsc --noEmit
        working-directory: sdk

      - name: Run tests
        run: npx vitest run
        working-directory: sdk

      - name: Build
        run: npx tsc
        working-directory: sdk

  api:
    name: API — Type Check & Test
    runs-on: ubuntu-latest
    needs: sdk
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install all dependencies
        run: bun install

      - name: Build SDK (required by API)
        run: npx tsc
        working-directory: sdk

      - name: Type check API
        run: npx tsc --noEmit
        working-directory: api

      - name: Run API tests
        run: npx vitest run
        working-directory: api

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Biome check
        run: npx biome check .
        continue-on-error: true
